<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" className="w-full h-auto">
  <!-- Background -->
  <rect width="400" height="300" fill="#0f172a" rx="8"/>

  <!-- Room background with subtle gradient -->
  <defs>
    <linearGradient id="roomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="lampLight" cx="50%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Lamp light effect -->
  <circle cx="200" cy="60" r="120" fill="url(#lampLight)"/>

  <!-- Desk -->
  <rect x="50" y="180" width="300" height="15" fill="#374151" rx="2"/>
  <rect x="45" y="175" width="310" height="5" fill="#4b5563" rx="2"/>

  <!-- Monitor -->
  <rect x="120" y="120" width="160" height="100" fill="#1f2937" rx="4"/>
  <rect x="130" y="130" width="140" height="80" fill="#0f172a" rx="2"/>
  <!-- VS Code interface -->
  <rect x="135" y="135" width="130" height="4" fill="#06b6d4" rx="1"/>
  <rect x="135" y="145" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="150" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="155" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="160" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="165" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="170" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="175" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="180" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="185" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="190" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="195" width="130" height="2" fill="#64748b" rx="1"/>
  <rect x="135" y="200" width="130" height="2" fill="#64748b" rx="1"/>

  <!-- Monitor stand -->
  <rect x="190" y="220" width="20" height="10" fill="#374151" rx="1"/>
  <rect x="195" y="230" width="10" height="8" fill="#4b5563" rx="1"/>

  <!-- Keyboard -->
  <rect x="80" y="230" width="80" height="25" fill="#1f2937" rx="2"/>
  <rect x="85" y="235" width="70" height="15" fill="#374151" rx="1"/>
  <!-- Keyboard keys -->
  <rect x="88" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="93" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="98" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="103" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="108" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="113" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="118" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="123" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="128" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="133" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="138" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="143" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="148" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>
  <rect x="153" y="238" width="3" height="3" fill="#6b7280" rx="0.5"/>

  <!-- Mouse -->
  <ellipse cx="240" cy="245" rx="8" ry="12" fill="#1f2937"/>
  <ellipse cx="240" cy="245" rx="6" ry="10" fill="#374151"/>
  <rect x="238" y="235" width="4" height="2" fill="#6b7280" rx="1"/>

  <!-- Coffee mug -->
  <ellipse cx="320" cy="240" rx="12" ry="8" fill="#1f2937"/>
  <rect x="308" y="232" width="24" height="20" fill="#1f2937"/>
  <ellipse cx="320" cy="252" rx="12" ry="4" fill="#374151"/>
  <rect x="310" y="248" width="20" height="4" fill="#374151"/>
  <!-- Coffee steam -->
  <path d="M 315 225 Q 315 220 318 220 Q 321 220 321 225" stroke="#9ca3af" stroke-width="1" fill="none"/>
  <path d="M 320 225 Q 320 220 323 220 Q 326 220 326 225" stroke="#9ca3af" stroke-width="1" fill="none"/>
  <path d="M 325 225 Q 325 220 328 220 Q 331 220 331 225" stroke="#9ca3af" stroke-width="1" fill="none"/>

  <!-- Desk lamp -->
  <rect x="180" y="140" width="4" height="40" fill="#4b5563"/>
  <ellipse cx="182" cy="140" rx="8" ry="6" fill="#fbbf24"/>
  <path d="M 174 140 Q 182 120 190 140" fill="#fbbf24" opacity="0.7"/>
  <circle cx="182" cy="135" r="3" fill="#fbbf24" opacity="0.9"/>

  <!-- Person silhouette (simple representation) -->
  <circle cx="200" cy="90" r="15" fill="#374151"/>
  <rect x="185" y="105" width="30" height="40" fill="#374151" rx="15"/>
  <rect x="190" y="145" width="20" height="35" fill="#374151" rx="10"/>
  <!-- Arms -->
  <rect x="175" y="110" width="10" height="25" fill="#374151" rx="5"/>
  <rect x="215" y="110" width="10" height="25" fill="#374151" rx="5"/>

  <!-- Window with night sky -->
  <rect x="20" y="20" width="80" height="60" fill="#0f172a" stroke="#374151" stroke-width="2" rx="4"/>
  <rect x="25" y="25" width="70" height="50" fill="#1e293b"/>
  <!-- Stars -->
  <circle cx="35" cy="35" r="1" fill="#fbbf24"/>
  <circle cx="55" cy="40" r="1" fill="#fbbf24"/>
  <circle cx="75" cy="35" r="1" fill="#fbbf24"/>
  <circle cx="45" cy="55" r="1" fill="#fbbf24"/>
  <circle cx="65" cy="50" r="1" fill="#fbbf24"/>
  <circle cx="30" cy="50" r="1" fill="#fbbf24"/>
</svg>